<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NeoSpark Solutions</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #0b1220, #0e1a33);
  color: #e8edf7;
}

/* HEADER */
.header {
  display: flex;
  justify-content: center;
  padding: 30px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(8px);
  box-shadow: 0 1px 0 rgba(109, 211, 255, 0.1);
}

.header-inner {
  width: 100%;
  max-width: 1100px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.logo {
  height: 72px;
  filter: drop-shadow(0 0 12px rgba(109, 211, 255, 0.35));
}

.brand {
  font-size: 1.4rem;
  font-weight: 600;
  letter-spacing: 0.6px;
}

.subtle-tag {
  margin-left: auto;
  font-size: 0.8rem;
  color: #6dd3ff;
  opacity: 0.8;
}

/* MAIN */
.main {
  display: flex;
  align-items: center;
  justify-content: center;
  height: calc(100vh - 140px);
}

.container {
  text-align: center;
  max-width: 400px;
  width: 90%;
  padding: 30px;
  border-radius: 16px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}

h2 {
  font-size: 1.3rem;
  font-weight: 500;
  color: #a9b4c9;
  margin-bottom: 30px;
}

/* INPUTS */
input {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 8px;
  border: none;
  font-size: 1rem;
  background: #1a243a;
  color: #e8edf7;
}

input::placeholder {
  color: #7f8aa3;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  font-size: 1rem;
  border-radius: 8px;
  border: none;
  background: linear-gradient(135deg, #4fd1c5, #6366f1);
  color: #0b1220;
  cursor: pointer;
  font-weight: 600;
}

button:hover {
  opacity: 0.9;
}

.error {
  color: #ff6b6b;
  margin-top: 10px;
  display: none;
}

/* FOOTER */
footer {
  position: absolute;
  bottom: 15px;
  width: 100%;
  text-align: center;
  font-size: 0.85rem;
  color: #7f8aa3;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="header-inner">
    <img src="neospark-logo.webp" class="logo" />
    <div class="brand">NeoSpark Solutions</div>
    <div class="subtle-tag">Client Access</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="container">
    <h2>Client Portal</h2>

    <input type="text" id="username" placeholder="Username" />
    <input type="password" id="password" placeholder="Password" />

    <button onclick="login()">Login</button>

    <div class="error" id="error">Invalid credentials</div>
  </div>
</div>

<footer>
  © 2026 NeoSpark Solutions
</footer>

<script>
function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if (user === "client" && pass === "neospark") {
    window.location.href = "https://neosparksentinel.com";
  } else {
    document.getElementById("error").style.display = "block";
  }
}
</script>

</body>
</html>
